<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,
        body{
            margin:0;
            min-height:90vh;
            color:rgb(161,161,161);
            font-family: 'Brush Script MT', cursive;
        }

        body{
            display:flex;
            gap:20px;
            padding:20px;
            background:#7c6363;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .background{
            position:fixed;
            inset:0;
            object-fit:cover;
            width:100%;
            height:100%;
            filter:blur(10px);
            transform:scale(1.1);
            z-index:-1;
        }

        .BigContainer{
            background:rgba(0,0,0,.7);
            border-radius:10px;
            padding:20px;
            transition:background-color .3s, color .3s;
            width: 30vh;
            height: 50vh;
            justify-content: center;
            align-items: center;

        }

        .BigContainer:hover{
            background:rgba(129,129,129,.7);
            color:black;

        }
        .smallContainer{
            width:80%;
            background-color: rgba(61, 61, 61, 0.7) ;
            border-radius: 10px;
            padding: 1vh;
            margin-left: auto;
            margin-right: auto;
            transition:background-color .3s, color .3s;
        }
        .smallContainer:hover{
            background-color: rgba(0, 0, 0, 0.7);
            color: rgb(161,161,161);
        }
    </style>
</head>
<body>
    <img src="assets/digaxn7-b52c9765-13ce-4034-b99d-f1a6b1030161.gif" alt="" class="background">
    <div class="BigContainer"> 
        <h1 style="text-align: center;">Simarask</h1>

        <div class="smallContainer" onclick="window.location.href='https://www.instagram.com/simarask?igsh=emZ6MWpjd2JzdXE0'"><img src="assets/instagram-new.png" style="width: 2vh; top: 0.5vh; position: relative;"> instagram</div>
    </div>
</body>
</html>
